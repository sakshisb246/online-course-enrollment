<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div id="user-display">Welcome, Instructor</div>
        <nav>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <div class="auth-container" style="margin: 30px auto; max-width: 600px;">
            <h2>Add New Course</h2>
            <form id="add-course-form" onsubmit="handleAddCourse(event)">
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="course-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="course-desc" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn">Add Course</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        checkAuth('instructor');
    </script>
</body>

</html>
